on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

name: lint
permissions:  # added using https://github.com/step-security/secure-workflows
  contents: read

jobs:
  check-versions:
    permissions:
      contents: read
    name: check-versions
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0

      - name: Check release version alignment
        run: make check-versions

  go:
    permissions:
      contents: read  # for actions/checkout to fetch code
      pull-requests: read  # for golangci/golangci-lint-action to fetch pull requests
    name: go
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit # TODO: change to 'egress-policy: block' after couple of runs

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: latest
          working-directory: go
          output: checkstyle

  python:
    name: python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        working-directory: ./python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run linting and type checking (Make)
        run: make lint-python

  java:
    name: java
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Lint / formatting check
        run: make lint-java

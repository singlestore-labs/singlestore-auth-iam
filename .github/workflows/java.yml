name: java

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Lint / formatting check
        run: make lint-java

      - name: Run tests with coverage (mvn verify)
        working-directory: java
        run: mvn -q -DskipTests=false verify

      - name: Show coverage summary
        if: always()
        run: |
          if [ -f java/target/site/jacoco/index.html ]; then
            echo "JaCoCo report generated"
          fi
          if [ -f java/target/site/jacoco/jacoco.xml ]; then
            grep -q '<report' java/target/site/jacoco/jacoco.xml && echo "jacoco.xml present"
          fi

      - name: Upload Java coverage to Codecov
        uses: codecov/codecov-action@v5.5.5
        with:
          files: java/target/site/jacoco/jacoco.xml
          flags: java
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  release:
    needs: build-test-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21 with Maven Central settings
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: ossrh
          server-username: SONATYPE_USERNAME
          server-password: SONATYPE_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build and publish to Maven Central
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USER }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          RELEASE_VERSION=${GITHUB_REF_NAME#v}
          mvn versions:set -DnewVersion=$RELEASE_VERSION -DgenerateBackupPoms=false
          mvn clean deploy -DskipTests
